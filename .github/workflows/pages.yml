name: Deploy GH Pages Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Build WASI demo binary
        run: cargo build --release --target wasm32-wasip1 --bin demo_wasi
      - name: Prepare static site
        run: |
          rm -rf site
          mkdir -p site
          cp docs/index.html docs/app.js docs/styles.css docs/examples.json site/
          cp target/wasm32-wasip1/release/demo_wasi.wasm site/demo_wasi.wasm
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
